<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PollVote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/theme-light.css">
    <link rel="stylesheet" href="css/theme-dark.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-card {
            max-width: 420px;
            margin: 0 auto;
        }
        .login-wrapper {
            min-height: 80vh;
            display: flex;
            align-items: center;
        }
        .login-form .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .login-form .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.2rem var(--accent-light);
        }
        .login-form .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .login-error {
            display: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #dc3545;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .login-error.show {
            display: block;
        }
        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        .demo-accounts {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background: var(--badge-bg);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .demo-accounts code {
            color: var(--accent-color);
            background: transparent;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">Poll<span>Vote</span></a>
            <div class="d-flex align-items-center gap-2">
                <div class="theme-toggle-group">
                    <button class="theme-btn active" data-theme="light">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        Light
                    </button>
                    <button class="theme-btn" data-theme="dark">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        Dark
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="login-wrapper">
            <div class="card poll-card login-card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <h4 class="fw-bold">Welcome Back</h4>
                        <p class="login-subtitle">Sign in to cast your vote</p>
                    </div>

                    <div class="login-error" id="loginError"></div>

                    <form class="login-form" id="loginForm" autocomplete="off">
                        <div class="mb-3">
                            <label class="form-label" for="username">Username</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter your username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn vote-btn text-white w-100 mt-2" id="loginBtn">
                            Sign In
                        </button>
                    </form>

                    <div class="demo-accounts">
                        <strong class="d-block mb-2">Demo Accounts:</strong>
                        <div>Admin: <code>admin</code> / <code>admin123</code></div>
                        <div>Users: <code>alice</code>, <code>bob</code>, <code>charlie</code> — password: <code>password123</code></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const saved = localStorage.getItem('poll-theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            if (saved === 'dark') document.documentElement.setAttribute('data-bs-theme', 'dark');
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === saved);
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    document.documentElement.setAttribute('data-theme', theme);
                    if (theme === 'dark') {
                        document.documentElement.setAttribute('data-bs-theme', 'dark');
                    } else {
                        document.documentElement.removeAttribute('data-bs-theme');
                    }
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
                    localStorage.setItem('poll-theme', theme);
                });
            });

            const form = document.getElementById('loginForm');
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorEl.classList.remove('show');
                btn.disabled = true;
                btn.textContent = 'Signing in...';

                try {
                    const res = await fetch('php/login.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: document.getElementById('username').value.trim(),
                            password: document.getElementById('password').value
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        window.location.href = 'index.html';
                    } else {
                        errorEl.textContent = data.error || 'Login failed';
                        errorEl.classList.add('show');
                    }
                } catch (err) {
                    errorEl.textContent = 'Could not connect to server. Is XAMPP running?';
                    errorEl.classList.add('show');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            });
        })();
    </script>
</body>
</html>
