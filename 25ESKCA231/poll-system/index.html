<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PollVote - Interactive Polling System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/theme-light.css">
    <link rel="stylesheet" href="css/theme-dark.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">Poll<span>Vote</span></a>
            <div class="d-flex align-items-center gap-2">
                <div id="authSection" class="d-flex align-items-center gap-2">
                    <span id="userDisplay" class="d-none" style="font-size:0.9rem;color:var(--text-primary);font-weight:500;"></span>
                    <a id="adminLink" href="admin/index.html" class="d-none btn btn-sm" style="background:var(--accent-color);color:#fff;border-radius:6px;font-weight:500;">Admin</a>
                    <button id="logoutBtn" class="d-none btn btn-sm" style="border:1px solid var(--border-color);color:var(--text-secondary);border-radius:6px;">Logout</button>
                    <a id="loginBtn" href="login.html" class="btn btn-sm" style="background:var(--accent-color);color:#fff;border-radius:6px;font-weight:500;">Login</a>
                </div>
                <div class="theme-toggle-group">
                    <button class="theme-btn active" data-theme="light" title="Light mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        Light
                    </button>
                    <button class="theme-btn" data-theme="dark" title="Dark mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        Dark
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="text-center mb-4">
            <h1 class="page-title">Polling Station</h1>
            <p class="page-subtitle" id="pageSubtitle">Vote on the topics below and see live results</p>
        </div>

        <div id="pollsContainer" class="row g-4">
            <div class="loading-container" id="loadingState">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="voteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Your Vote</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalPollQuestion" class="fw-semibold mb-2"></p>
                    <p id="modalSelectedOption" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn modal-confirm-btn text-white" id="confirmVoteBtn">Submit Vote</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
